<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />

    <!-- Primary SEO Meta Tags (Default - Will be overridden by React Helmet) -->
    <title>Octacrest Corporate</title>
    <meta
      name="description"
      content="Octacrest Corporate unites global expertise across diverse domains including IT Consulting, Peptides Research, and Global Conferences."
    />
    <meta
      name="keywords"
      content="Octacrest Corporate, Helix Conferences, CodeIt Consulting, Peptides Knowledge Park, Channel8, Helix Escroll, DigiGro, Aura Business Consulting, Helix Open Access Journals"
    />
    <meta name="author" content="Octacrest Corporate" />

    <script src="https://cdn.jsdelivr.net/npm/ol@v10.6.0/dist/ol.js"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/ol@v10.6.0/ol.css"
    />

    <!-- Dynamic Canonical URL handled by React Helmet in src/components/SEO.tsx -->

    <!-- Robots meta tag for crawler instructions -->
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook / LinkedIn / WhatsApp -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://octacrestcorporate.com/" />
    <meta
      property="og:title"
      content="Octacrest Corporate - IT Consulting, Peptide Research & Global Conferences"
    />
    <meta
      property="og:description"
      content="Octacrest Corporate offers advanced IT consulting through CodeIt Consulting, cutting-edge peptide research via Peptides.co.in, and expertly managed global events with Helix Conferences. Explore our integrated solutions for technology, science, and events."
    />
    <meta
      property="og:image"
      content="https://octacrestcorporate.com/og-image.jpg"
    />
    <!-- IMPORTANT: Replace with your actual OG image URL (1200x630px recommended) -->
    <meta property="og:site_name" content="Octacrest Corporate" />

    <!-- Twitter Card -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://octacrestcorporate.com/" />
    <meta
      property="twitter:title"
      content="Octacrest Corporate - IT Consulting, Peptide Research & Global Conferences"
    />
    <meta
      property="twitter:description"
      content="Octacrest Corporate offers advanced IT consulting through CodeIt Consulting, cutting-edge peptide research via Peptides.co.in, and expertly managed global events with Helix Conferences. Explore our integrated solutions for technology, science, and events."
    />
    <meta
      property="twitter:image"
      content="https://octacrestcorporate.com/twitter-image.jpg"
    />
    <!-- IMPORTANT: Replace with your actual Twitter image URL (800x418px recommended) -->
    <meta name="twitter:creator" content="@OctacrestCorp" />
    <!-- Optional: Your company's Twitter handle if you have one -->

    <!-- JSON-LD Structured Data for Organization and Website -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Octacrest Corporate",
          "url": "https://octacrestcorporate.com/",
          "logo": "https://octacrestcorporate.com/logo.png",
          "description": "Octacrest Corporate is a diversified holding company providing IT consulting, peptide research, and conference management solutions.",
          "sameAs": [
            "https://www.linkedin.com/company/octacrest-corporate",
            "https://twitter.com/OctacrestCorp"
          ],
          "hasPart": [
            {
              "@type": "Organization",
              "name": "CodeIt Consulting",
              "url": "https://codeitconsulting.pro/",
              "description": "CodeIt Consulting provides advanced IT consulting and technology solutions."
            },
            {
              "@type": "Organization",
              "name": "Peptides Knowledge Park",
              "url": "https://peptides.co.in/",
              "description": "Peptides Knowledge Park specializes in cutting-edge peptide research and related services."
            },
            {
              "@type": "Organization",
              "name": "Helix Conferences",
              "url": "https://helixconferences.com/",
              "description": "Helix Conferences expertly manages and organizes global events and conferences."
            },
            {
              "@type": "Organization",
              "name": "DigiGro",
              "url": "https://octacrestcorporate.com/digigro",
              "description": "DigiGro specializes in social media marketing, content creation, and digital advertising."
            },
            {
              "@type": "Organization",
              "name": "Channel8",
              "url": "https://octacrestcorporate.com/channel8",
              "description": "Channel8 is a diverse YouTube channel covering food, business, technology, and lifestyle."
            },
            {
              "@type": "Organization",
              "name": "Helix Escroll",
              "url": "https://octacrestcorporate.com/e-volve",
              "description": "Helix Escroll provides expert digital marketing, SEO, and content marketing services."
            },
            {
              "@type": "Organization",
              "name": "Aura Business Consulting",
              "url": "https://octacrestcorporate.com/aura-business-consulting",
              "description": "Aura Business Consulting provides A-to-Z business consulting, strategic planning, and financial advisory services."
            },
            {
              "@type": "Organization",
              "name": "Helix Open Access Journals",
              "url": "https://octacrestcorporate.com/helix-journals",
              "description": "Peer-reviewed International Journals in Science, Technology, Health & Agriculture."
            }
          ]
        },
        {
          "@type": "WebSite",
          "url": "https://octacrestcorporate.com/",
          "name": "Octacrest Corporate",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://octacrestcorporate.com/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>

    <!-- Favicon and Apple Touch Icon (existing) -->
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
